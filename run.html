<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ question }} — Based Answers</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.mjs" type="module"></script>
<style>
  :root {
    --bg: #fff;
    --text: #1a1a2e;
    --muted: #555;
    --border: #ddd;
    --accent: #2563eb;
    --highlight: rgba(255, 213, 0, 0.35);
    --card-bg: #f8f9fa;
    --card-border: #e9ecef;
    --ok: #16a34a;
    --bad: #dc2626;
    --warn: #d97706;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    padding: 2rem 1rem;
    max-width: 900px;
    margin: 0 auto;
  }
  .brand {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text);
    text-decoration: none;
    display: inline-block;
    margin-bottom: 1rem;
  }
  .brand span { color: var(--accent); }
  h1 { font-size: 1.5rem; margin-bottom: 1rem; border-bottom: 2px solid var(--accent); padding-bottom: 0.5rem; }
  h2 { font-size: 1.1rem; margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.3rem; }

  .spinner {
    display: inline-block;
    width: 0.9em;
    height: 0.9em;
    border: 2px solid var(--accent);
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: -0.1em;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 8px;
    padding: 0.6rem 1rem;
    margin-bottom: 1.5rem;
    font-size: 0.95rem;
  }
  .status-bar .round { font-weight: 700; color: var(--accent); white-space: nowrap; }
  .status-bar.passed { border-color: var(--ok); }
  .status-bar.passed .phase { color: var(--ok); font-weight: 600; }
  .status-bar.exhausted { border-color: var(--warn); }
  .status-bar.exhausted .phase { color: var(--warn); font-weight: 600; }
  .status-bar.error { border-color: var(--bad); }
  .status-bar.error .phase { color: var(--bad); font-weight: 600; }

  .placeholder {
    display: flex;
    align-items: center;
    gap: 0.7rem;
    color: var(--muted);
    font-style: italic;
    padding: 2.5rem 1rem;
    justify-content: center;
  }

  /* answer fragment (same look as the static answer page) */
  .concatenation { font-size: 1.1rem; line-height: 1.8; }
  .concatenation sup { font-size: 0.75rem; }
  .concatenation sup a { color: var(--accent); text-decoration: none; font-weight: 600; }
  .concatenation sup a:hover { text-decoration: underline; }
  .references { margin-top: 2.5rem; }
  .ref-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 8px;
    padding: 1rem;
    margin-bottom: 1rem;
  }
  .ref-card .num { display: inline-block; font-weight: 700; color: var(--accent); margin-right: 0.5rem; }
  .ref-card blockquote { margin: 0.3rem 0 0.3rem 1.5rem; font-style: italic; color: var(--text); opacity: 0.9; }
  .ref-card .meta { font-size: 0.85rem; color: var(--muted); }
  .ref-card .meta a { color: var(--accent); }
  .pdf-preview-wrap { margin-top: 0.75rem; position: relative; display: inline-block; }
  .pdf-preview-wrap canvas { border: 1px solid var(--border); border-radius: 4px; max-width: 100%; }
  .unable { text-align: center; padding: 3rem; color: var(--muted); font-style: italic; }
  .error-banner {
    background: #fef2f2;
    color: #991b1b;
    padding: 0.5rem 1rem;
    border-radius: 4px;
    margin-bottom: 1rem;
    font-size: 0.85rem;
  }

  /* checks panel */
  .checks { margin-top: 2.5rem; }
  .check-row {
    display: flex;
    align-items: baseline;
    gap: 0.6rem;
    padding: 0.35rem 0;
    font-size: 0.95rem;
  }
  .check-row .icon { width: 1.2em; text-align: center; flex-shrink: 0; }
  .check-row .icon.pass::before { content: "✓"; color: var(--ok); font-weight: 700; }
  .check-row .icon.fail::before { content: "✗"; color: var(--bad); font-weight: 700; }
  .check-row .label { color: var(--text); }
  .check-row.pending .label { color: var(--muted); }
  .checks details { margin: 0.4rem 0 0.4rem 1.8em; font-size: 0.85rem; }
  .checks details pre {
    white-space: pre-wrap;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 6px;
    padding: 0.6rem;
    margin-top: 0.3rem;
    max-height: 16rem;
    overflow: auto;
  }
  .feedback-block summary { color: var(--warn); cursor: pointer; }

  /* agent streams */
  .streams { margin-top: 2.5rem; }
  .streams summary {
    cursor: pointer;
    font-size: 1.1rem;
    font-weight: 600;
    border-bottom: 1px solid var(--border);
    padding-bottom: 0.3rem;
    margin-bottom: 0.8rem;
  }
  .tabs { display: flex; gap: 0.4rem; margin-bottom: 0.6rem; }
  .tabs button {
    font-size: 0.85rem;
    padding: 0.3rem 0.9rem;
    border: 1px solid var(--card-border);
    background: var(--card-bg);
    border-radius: 6px 6px 0 0;
    cursor: pointer;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .tabs button.active { color: var(--text); border-color: var(--accent); font-weight: 600; }
  .tabs button .dot {
    width: 0.5em; height: 0.5em; border-radius: 50%;
    background: var(--accent);
    display: none;
  }
  .tabs button.live .dot { display: inline-block; animation: pulse 1s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }
  .stream {
    display: none;
    background: #14141f;
    color: #d6d6e0;
    border-radius: 0 6px 6px 6px;
    padding: 0.8rem;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 0.78rem;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
    height: 24rem;
    overflow-y: auto;
  }
  .stream.active { display: block; }
  .stream:empty::before { content: "(no output yet)"; color: #666; font-style: italic; }
</style>
</head>
<body>
<a class="brand" href="/">Based <span>Answers</span></a>
<h1>{{ question }}</h1>

{% if prerendered %}
<div id="answer">{{ prerendered | safe }}</div>
{% else %}
<div class="status-bar" id="status-bar">
  <span class="spinner" id="status-spinner"></span>
  <span class="round" id="round-label">Round –/{{ max_rounds }}</span>
  <span class="phase" id="phase-label">connecting…</span>
</div>

<div id="answer">
  <div class="placeholder"><span class="spinner"></span> Generating claims…</div>
</div>

<section class="checks">
  <h2>Checks</h2>
  <div id="check-rows">
    <p class="placeholder" id="checks-placeholder" style="padding:0.5rem">Waiting for a draft answer…</p>
  </div>
  <div id="feedback"></div>
</section>

<details class="streams" open>
  <summary>Agent streams</summary>
  <div class="tabs">
    <button data-tab="searcher" class="active">Searcher <span class="dot"></span></button>
    <button data-tab="semantic">Semantic <span class="dot"></span></button>
    <button data-tab="coherence">Coherence <span class="dot"></span></button>
  </div>
  <pre id="stream-searcher" class="stream active"></pre>
  <pre id="stream-semantic" class="stream"></pre>
  <pre id="stream-coherence" class="stream"></pre>
</details>

<script>
const RUN_ID = {{ run_id | tojson }};
const MAX_ROUNDS = {{ max_rounds | tojson }};
const TERMINAL = { passed: "all checks passed", exhausted: "gave up — showing last attempt", error: "pipeline error" };
const PHASE_TEXT = {
  searching: "searching sources & generating claims…",
  deterministic: "verifying citations appear verbatim…",
  semantic: "checking each claim against its sources…",
  coherence: "checking answer coherence & completeness…",
};
const CHECKER_OF_PHASE = { searching: "searcher", semantic: "semantic", coherence: "coherence" };

let lastId = 0;
let done = false;

const $ = (id) => document.getElementById(id);

// ── tabs ──
document.querySelectorAll(".tabs button").forEach((btn) => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tabs button").forEach((b) => b.classList.remove("active"));
    document.querySelectorAll(".stream").forEach((s) => s.classList.remove("active"));
    btn.classList.add("active");
    $("stream-" + btn.dataset.tab).classList.add("active");
  });
});

function appendLine(agent, line) {
  const pre = $("stream-" + agent);
  if (!pre) return;
  const pinned = pre.scrollTop + pre.clientHeight >= pre.scrollHeight - 8;
  pre.textContent += line + "\n";
  if (pinned) pre.scrollTop = pre.scrollHeight;
}

function setLiveTab(agent) {
  document.querySelectorAll(".tabs button").forEach((b) =>
    b.classList.toggle("live", b.dataset.tab === agent));
}

// ── checks panel ──
function checkRow(id, label) {
  let row = $(id);
  if (!row) {
    $("checks-placeholder")?.remove();
    row = document.createElement("div");
    row.className = "check-row pending";
    row.id = id;
    row.innerHTML = '<span class="icon spinner"></span><span class="label"></span>';
    $("check-rows").appendChild(row);
  }
  row.querySelector(".label").textContent = label;
  return row;
}

function setRowStatus(row, status) {
  const icon = row.querySelector(".icon");
  icon.classList.remove("spinner", "pass", "fail");
  row.classList.remove("pending");
  if (status === "checking") { icon.classList.add("spinner"); row.classList.add("pending"); }
  else icon.classList.add(status === "pass" ? "pass" : "fail");
}

function resetChecks() {
  // a new round rewrites the answer; previous rows no longer apply
  $("check-rows").innerHTML = "";
}

// ── event handling ──
function handle(msg) {
  if (!msg.id) return; // ping
  lastId = msg.id;
  const d = msg.data || {};

  if (msg.event === "phase") {
    const phase = d.phase;
    if (d.round) $("round-label").textContent = `Round ${d.round}/${MAX_ROUNDS}`;
    if (phase in TERMINAL) {
      done = true;
      $("phase-label").textContent = TERMINAL[phase];
      $("status-spinner").style.display = "none";
      $("status-bar").classList.add(phase);
      setLiveTab(null);
      document.querySelectorAll("#answer .placeholder .spinner").forEach((s) => s.remove());
    } else {
      $("phase-label").textContent = PHASE_TEXT[phase] || phase;
      setLiveTab(CHECKER_OF_PHASE[phase] || null);
      if (phase === "searching" && d.round > 1) resetChecks();
      if (phase === "deterministic")
        setRowStatus(checkRow("check-det", "Citations verified verbatim against PDFs"), "checking");
    }
  } else if (msg.event === "agent-line") {
    appendLine(d.agent, d.line);
  } else if (msg.event === "claim-status") {
    const row = checkRow("claim-" + d.index, `Claim ${d.index + 1}: ${d.claim}`);
    setRowStatus(row, d.status);
  } else if (msg.event === "check-result") {
    const label = d.check === "deterministic"
      ? "Citations verified verbatim against PDFs"
      : "Answer coherence & completeness";
    const row = checkRow(d.check === "deterministic" ? "check-det" : "check-coh", label);
    setRowStatus(row, d.passed ? "pass" : "fail");
    if (!d.passed && d.output) {
      const det = document.createElement("details");
      det.innerHTML = "<summary>checker output</summary><pre></pre>";
      det.querySelector("pre").textContent = d.output;
      row.after(det);
    }
  } else if (msg.event === "answer") {
    $("answer").innerHTML = d.html;
    window.renderAllPreviews?.();
  } else if (msg.event === "feedback") {
    const det = document.createElement("details");
    det.className = "feedback-block";
    det.innerHTML = `<summary>Round ${d.round} failed — feedback sent to the agent</summary><pre></pre>`;
    det.querySelector("pre").textContent = d.text;
    $("feedback").appendChild(det);
  }
}

function connect() {
  const proto = location.protocol === "https:" ? "wss:" : "ws:";
  const ws = new WebSocket(`${proto}//${location.host}/ws/${encodeURIComponent(RUN_ID)}`);
  ws.onopen = () => ws.send(JSON.stringify({ last_id: lastId }));
  ws.onmessage = (e) => handle(JSON.parse(e.data));
  ws.onclose = () => { if (!done) setTimeout(connect, 2000); };
}
connect();
</script>
{% endif %}

<script type="module">
import * as pdfjsLib from "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.mjs";
pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.worker.min.mjs";

const SCALE = 0.5;

async function renderPreview(wrap) {
  const pdfPath = wrap.dataset.pdf;
  const pageNum = parseInt(wrap.dataset.page, 10);
  const highlights = JSON.parse(wrap.dataset.highlights || "[]");
  const canvas = wrap.querySelector("canvas");

  try {
    const pdf = await pdfjsLib.getDocument(pdfPath).promise;
    const page = await pdf.getPage(pageNum);
    const viewport = page.getViewport({ scale: SCALE });

    canvas.width = viewport.width;
    canvas.height = viewport.height;
    const ctx = canvas.getContext("2d");

    await page.render({ canvasContext: ctx, viewport: viewport }).promise;

    for (const h of highlights) {
      const [x0, y0, x1, y1] = h.bbox;
      ctx.fillStyle = "rgba(255, 213, 0, 0.35)";
      ctx.fillRect(x0 * SCALE, y0 * SCALE, (x1 - x0) * SCALE, (y1 - y0) * SCALE);
    }
  } catch (e) {
    canvas.style.display = "none";
  }
}

window.renderAllPreviews = () =>
  document.querySelectorAll(".pdf-preview-wrap").forEach(renderPreview);
window.renderAllPreviews();
</script>
</body>
</html>
