<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ question }} — Based Answers</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.mjs" type="module"></script>
<style>
  :root {
    --bg: #fff;
    --text: #1a1a2e;
    --muted: #555;
    --border: #ddd;
    --accent: #2563eb;
    --highlight: rgba(255, 213, 0, 0.35);
    --card-bg: #f8f9fa;
    --card-border: #e9ecef;
    --ok: #16a34a;
    --bad: #dc2626;
    --warn: #d97706;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    padding: 2rem 1rem 5rem;
    max-width: 900px;
    margin: 0 auto;
  }
  .brand {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text);
    text-decoration: none;
    display: inline-block;
    margin-bottom: 1rem;
  }
  .brand span { color: var(--accent); }
  h1 { font-size: 1.5rem; margin-bottom: 1rem; border-bottom: 2px solid var(--accent); padding-bottom: 0.5rem; }
  h2 { font-size: 1.1rem; margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.3rem; }

  .spinner {
    display: inline-block;
    width: 0.9em;
    height: 0.9em;
    border: 2px solid var(--accent);
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: -0.1em;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 8px;
    padding: 0.6rem 1rem;
    margin-bottom: 1.5rem;
    font-size: 0.95rem;
  }
  .status-bar .round { font-weight: 700; color: var(--accent); white-space: nowrap; }
  /* Cumulative for the whole question, so it sits outside the round navigation */
  .token-bar {
    display: none;
    flex-wrap: wrap;
    align-items: baseline;
    gap: 0.35rem 1.1rem;
    margin: -1rem 0 1.5rem;
    padding: 0.5rem 1rem;
    border: 1px solid var(--card-border);
    border-radius: 8px;
    font-size: 0.85rem;
    color: var(--muted);
  }
  .token-bar.on { display: flex; }
  .token-bar .tk-label { font-weight: 600; color: var(--text); }
  .token-bar .tk-agent { white-space: nowrap; }
  .token-bar .tk-agent b { font-weight: 600; color: var(--text); }
  .token-bar .tk-cost { color: var(--muted); }
  .token-bar .tk-total { margin-left: auto; white-space: nowrap; color: var(--text); }
  .token-bar .tk-total b { color: var(--accent); }
  .status-bar.passed { border-color: var(--ok); }
  .status-bar.passed .phase { color: var(--ok); font-weight: 600; }
  .status-bar.exhausted { border-color: var(--warn); }
  .status-bar.exhausted .phase { color: var(--warn); font-weight: 600; }
  .status-bar.error { border-color: var(--bad); }
  .status-bar.error .phase { color: var(--bad); font-weight: 600; }

  .placeholder {
    display: flex;
    align-items: center;
    gap: 0.7rem;
    color: var(--muted);
    font-style: italic;
    padding: 2.5rem 1rem;
    justify-content: center;
  }

  /* answer fragment (same look as the static answer page) */
  .concatenation { font-size: 1.1rem; line-height: 1.8; }
  .concatenation sup { font-size: 0.75rem; }
  .concatenation sup a { color: var(--accent); text-decoration: none; font-weight: 600; }
  .concatenation sup a:hover { text-decoration: underline; }
  .references { margin-top: 2.5rem; }
  .ref-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 8px;
    padding: 1rem;
    margin-bottom: 1rem;
  }
  .ref-card .num { display: inline-block; font-weight: 700; color: var(--accent); margin-right: 0.5rem; }
  .ref-card blockquote { margin: 0.3rem 0 0.3rem 1.5rem; font-style: italic; color: var(--text); opacity: 0.9; }
  .ref-card .meta { font-size: 0.85rem; color: var(--muted); }
  .ref-card .meta a { color: var(--accent); }
  .ref-card .search-results { list-style: none; margin: 0.3rem 0 0.3rem 1.5rem; padding: 0; }
  .ref-card .search-results li { margin-bottom: 0.3rem; font-size: 0.9rem; }
  .ref-card .no-results { margin: 0.3rem 0 0.3rem 1.5rem; font-style: italic; color: var(--muted); }
  .ref-card .match-count { margin: 0.3rem 0 0.3rem 1.5rem; font-size: 0.85rem; color: var(--muted); }
  .ref-card code { font-size: 0.85em; }
  .pdf-preview-details { margin-top: 0.75rem; }
  .pdf-preview-details > summary { cursor: pointer; font-size: 0.85rem; color: var(--muted); }
  .pdf-preview-details > summary:hover { color: var(--accent); }
  .pdf-preview-wrap { margin-top: 0.4rem; position: relative; display: block; width: 100%; }
  .pdf-preview-wrap canvas { border: 1px solid var(--border); border-radius: 4px; width: 100%; height: auto; }
  .unable { text-align: center; padding: 3rem; color: var(--muted); font-style: italic; }
  .error-banner {
    background: #fef2f2;
    color: #991b1b;
    padding: 0.5rem 1rem;
    border-radius: 4px;
    margin-bottom: 1rem;
    font-size: 0.85rem;
  }

  /* collapsible agent streams */
  .stream-details { margin: 0.6rem 0 0.9rem; }
  .stream-details > summary {
    cursor: pointer;
    font-size: 0.85rem;
    color: var(--muted);
  }
  .stream-details > summary:hover { color: var(--accent); }
  .stream-details.live > summary::after {
    content: "";
    display: inline-block;
    width: 0.5em; height: 0.5em;
    border-radius: 50%;
    background: var(--accent);
    margin-left: 0.5em;
    animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }
  .stream {
    background: #14141f;
    color: #d6d6e0;
    border-radius: 6px;
    padding: 0.8rem;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 0.78rem;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 24rem;
    overflow-y: auto;
    margin-top: 0.4rem;
  }
  .stream:empty::before { content: "(no output yet)"; color: #666; font-style: italic; }
  #searcher-details { margin-top: 1rem; }
  .checks .stream-details { margin-left: 1.8em; }

  /* checks panel */
  .checks { margin-top: 2.5rem; }
  .check-row {
    display: flex;
    align-items: baseline;
    gap: 0.6rem;
    padding: 0.35rem 0;
    font-size: 0.95rem;
  }
  .check-row .icon { width: 1.2em; text-align: center; flex-shrink: 0; }
  .check-row .icon.pass::before { content: "✓"; color: var(--ok); font-weight: 700; }
  .check-row .icon.fail::before { content: "✗"; color: var(--bad); font-weight: 700; }
  .check-row .label { color: var(--text); }
  .check-row.pending .label { color: var(--muted); }
  .checks .det-output pre {
    white-space: pre-wrap;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 6px;
    padding: 0.6rem;
    margin-top: 0.3rem;
    max-height: 16rem;
    overflow: auto;
    font-size: 0.8rem;
  }
  .det-output { margin-left: 1.8em; font-size: 0.85rem; }
  .det-output summary { cursor: pointer; color: var(--muted); }

  /* round history navigation */
  .round-nav {
    position: fixed;
    bottom: 1rem;
    right: 1rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 999px;
    padding: 0.25rem 0.5rem;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    font-size: 0.85rem;
  }
  .round-nav button {
    border: none;
    background: none;
    font-size: 1.1rem;
    line-height: 1;
    padding: 0.2rem 0.45rem;
    cursor: pointer;
    color: var(--accent);
    border-radius: 999px;
  }
  .round-nav button:hover:not(:disabled) { background: var(--card-border); }
  .round-nav button:disabled { color: var(--border); cursor: default; }
  .round-nav .nav-label { color: var(--muted); white-space: nowrap; }
  .round-nav.history { border-color: var(--warn); }
  .round-nav.history .nav-label { color: var(--warn); font-weight: 600; }

  /* available PDF sources side panel */
  .sources-panel {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 8px;
    padding: 0.8rem 1rem;
    margin: 2.5rem 0;
    font-size: 0.9rem;
  }
  .sources-panel h2 {
    border: none;
    padding: 0;
    margin-bottom: 0.4rem;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
  }
  .sources-panel a {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 0.6rem;
    color: var(--accent);
    text-decoration: none;
    padding: 0.2rem 0;
  }
  .sources-panel a:hover .name { text-decoration: underline; }
  .sources-panel .name { word-break: break-word; }
  .sources-panel .pages { color: var(--muted); font-size: 0.8rem; white-space: nowrap; }
  @media (min-width: 1240px) {
    body { margin-right: calc(260px + 2rem); }
    .round-nav { right: calc(260px + 2rem); }
    .sources-panel {
      position: fixed;
      top: 2rem;
      right: 1rem;
      width: 260px;
      margin: 0;
      max-height: calc(100vh - 4rem);
      overflow-y: auto;
    }
  }
</style>
</head>
<body>
<a class="brand" href="/">Based <span>Answers</span></a>
<h1>{{ question }}</h1>

{% if prerendered %}
<div id="answer">{{ prerendered | safe }}</div>
{% else %}
<div class="status-bar" id="status-bar">
  <span class="spinner" id="status-spinner"></span>
  <span class="round" id="round-label">Round –/{{ max_rounds }}</span>
  <span class="phase" id="phase-label">connecting…</span>
</div>

<div class="token-bar" id="token-bar"></div>

<section>
  <div id="answer"></div>
  <details class="stream-details" id="searcher-details">
    <summary>Searcher agent stream</summary>
    <pre class="stream" id="stream-searcher"></pre>
  </details>
</section>

<section class="checks">
  <h2>Checks</h2>
  <div id="check-rows"></div>
</section>

<div class="round-nav" id="round-nav" hidden>
  <button id="nav-prev" title="Previous round">‹</button>
  <span class="nav-label" id="nav-label"></span>
  <button id="nav-next" title="Next round">›</button>
</div>

<script>
const RUN_ID = {{ run_id | tojson }};
const MAX_ROUNDS = {{ max_rounds | tojson }};
const TERMINAL = { passed: "all checks passed", exhausted: "gave up — showing last attempt", error: "pipeline error" };
const PHASE_TEXT = {
  searching: "searching sources & generating claims…",
  deterministic: "verifying citations appear verbatim…",
  semantic: "checking each claim against its sources…",
  coherence: "checking answer coherence & completeness…",
};

const $ = (id) => document.getElementById(id);

// ── per-round model: everything shown is derived from this ──
const rounds = new Map();
let currentRound = 0;   // latest round the pipeline has reached
let viewing = 0;        // round currently displayed
let terminal = null;
let lastId = 0;

function roundData(n) {
  if (!rounds.has(n)) {
    rounds.set(n, {
      searcher: "",
      answerHtml: null,
      claims: new Map(),  // index -> {claim, status, stream}
      det: null,          // {status, output}
      coh: null,          // {status, stream, output}
    });
  }
  return rounds.get(n);
}

function claimData(r, index, claim) {
  if (!r.claims.has(index)) r.claims.set(index, { claim: claim || "", status: "checking", stream: "" });
  const c = r.claims.get(index);
  if (claim) c.claim = claim;
  return c;
}

// ── DOM builders ──
function appendStream(pre, text) {
  const pinned = pre.scrollTop + pre.clientHeight >= pre.scrollHeight - 8;
  pre.textContent += text + "\n";
  if (pinned) pre.scrollTop = pre.scrollHeight;
}

function iconClass(status) {
  return status === "checking" ? "spinner" : status === "pass" ? "pass" : "fail";
}

function makeCheckRow(id, label, status) {
  const row = document.createElement("div");
  row.className = "check-row" + (status === "checking" ? " pending" : "");
  row.id = id;
  row.innerHTML = '<span class="icon"></span><span class="label"></span>';
  row.querySelector(".icon").classList.add(iconClass(status));
  row.querySelector(".label").textContent = label;
  return row;
}

function setRowStatus(row, status) {
  const icon = row.querySelector(".icon");
  icon.classList.remove("spinner", "pass", "fail");
  icon.classList.add(iconClass(status));
  row.classList.toggle("pending", status === "checking");
}

function makeStreamDetails(id, summary, content) {
  const det = document.createElement("details");
  det.className = "stream-details";
  det.id = id;
  det.innerHTML = "<summary></summary><pre class='stream'></pre>";
  det.querySelector("summary").textContent = summary;
  det.querySelector("pre").textContent = content;
  return det;
}

function claimStreamId(i) { return "claim-stream-" + i; }

function addClaimRow(container, index, c) {
  container.appendChild(makeCheckRow("claim-" + index, `Claim ${index + 1}: ${c.claim}`, c.status));
  container.appendChild(makeStreamDetails(claimStreamId(index), "semantic checker stream", c.stream));
}

function addCoherenceRow(container, coh) {
  container.appendChild(makeCheckRow("check-coh", "Answer coherence & completeness", coh.status));
  container.appendChild(makeStreamDetails("coh-stream", "coherence checker stream", coh.stream));
}

function addDetRow(container, det) {
  container.appendChild(makeCheckRow("check-det", "Citations verified verbatim against PDFs", det.status));
  if (det.status === "fail" && det.output) {
    const out = document.createElement("details");
    out.className = "det-output";
    out.innerHTML = "<summary>verifier output</summary><pre></pre>";
    out.querySelector("pre").textContent = det.output;
    container.appendChild(out);
  }
}

// ── full rebuild of answer + checks for the viewed round ──
function rebuild() {
  const r = rounds.get(viewing);
  const answer = $("answer");
  if (!r) {
    answer.innerHTML = '<div class="placeholder"><span class="spinner"></span> Waiting for the pipeline…</div>';
    $("check-rows").innerHTML = "";
    $("stream-searcher").textContent = "";
    updateNav();
    return;
  }

  if (r.answerHtml) {
    answer.innerHTML = r.answerHtml;
    window.renderAllPreviews?.();
  } else if (viewing === currentRound && !terminal) {
    answer.innerHTML = '<div class="placeholder"><span class="spinner"></span> Generating claims…</div>';
  } else {
    answer.innerHTML = '<div class="placeholder">No answer was produced this round.</div>';
  }

  $("stream-searcher").textContent = r.searcher;

  const rows = $("check-rows");
  rows.innerHTML = "";
  if (r.det) addDetRow(rows, r.det);
  for (const [index, c] of [...r.claims.entries()].sort((a, b) => a[0] - b[0])) addClaimRow(rows, index, c);
  if (r.coh) addCoherenceRow(rows, r.coh);
  if (!rows.children.length) {
    rows.innerHTML = '<p class="placeholder" style="padding:0.5rem">Waiting for a draft answer…</p>';
  }
  updateNav();
}

function updateNav() {
  const nav = $("round-nav");
  if (currentRound < 1) { nav.hidden = true; return; }
  nav.hidden = false;
  $("nav-label").textContent = viewing === currentRound
    ? `Round ${viewing}/${currentRound}`
    : `Round ${viewing}/${currentRound} (history)`;
  nav.classList.toggle("history", viewing !== currentRound);
  $("nav-prev").disabled = viewing <= 1;
  $("nav-next").disabled = viewing >= currentRound;
}

$("nav-prev").addEventListener("click", () => {
  if (viewing > 1) { viewing--; rebuild(); }
});
$("nav-next").addEventListener("click", () => {
  if (viewing < currentRound) { viewing++; rebuild(); }
});

function setLive(agent) {
  $("searcher-details").classList.toggle("live", agent === "searcher" && viewing === currentRound);
}

// ── event handling ──
function checksContainer() {
  const rows = $("check-rows");
  rows.querySelector(".placeholder")?.remove();
  return rows;
}

function handle(msg) {
  if (!msg.id) return; // ping
  lastId = msg.id;
  const d = msg.data || {};

  if (msg.event === "phase") {
    const phase = d.phase;
    if (d.round) $("round-label").textContent = `Round ${d.round}/${MAX_ROUNDS}`;

    if (phase === "searching" && d.round && d.round !== currentRound) {
      const follow = viewing === currentRound;
      currentRound = d.round;
      roundData(currentRound);
      if (follow) { viewing = currentRound; rebuild(); }
      else updateNav();
    } else if (d.round) {
      currentRound = Math.max(currentRound, d.round);
    }

    if (phase in TERMINAL) {
      terminal = phase;
      $("phase-label").textContent = TERMINAL[phase];
      $("status-spinner").style.display = "none";
      $("status-bar").classList.add(phase);
      setLive(null);
      if (viewing === currentRound) rebuild();
    } else {
      $("phase-label").textContent = PHASE_TEXT[phase] || phase;
      setLive(phase === "searching" ? "searcher" : null);
      if (phase === "deterministic") {
        roundData(currentRound).det = { status: "checking", output: "" };
        if (viewing === currentRound && !$("check-det")) {
          addDetRow(checksContainer(), roundData(currentRound).det);
        }
      } else if (phase === "coherence") {
        const cr = roundData(currentRound);
        if (!cr.coh) cr.coh = { status: "checking", stream: "", output: "" };
        if (viewing === currentRound && !$("check-coh")) {
          addCoherenceRow(checksContainer(), cr.coh);
        }
      }
    }
    updateNav();

  } else if (msg.event === "agent-line") {
    const cr = roundData(currentRound || 1);
    if (d.agent === "searcher") {
      cr.searcher += d.line + "\n";
      if (viewing === currentRound) appendStream($("stream-searcher"), d.line);
    } else if (d.agent === "semantic") {
      const c = claimData(cr, d.claim ?? 0);
      c.stream += d.line + "\n";
      if (viewing === currentRound) {
        const det = $(claimStreamId(d.claim ?? 0));
        if (det) appendStream(det.querySelector("pre"), d.line);
        else rebuild();
      }
    } else if (d.agent === "coherence") {
      if (!cr.coh) cr.coh = { status: "checking", stream: "", output: "" };
      cr.coh.stream += d.line + "\n";
      if (viewing === currentRound) {
        const det = $("coh-stream");
        if (det) appendStream(det.querySelector("pre"), d.line);
        else rebuild();
      }
    }

  } else if (msg.event === "claim-status") {
    const cr = roundData(currentRound || 1);
    const c = claimData(cr, d.index, d.claim);
    c.status = d.status;
    if (viewing === currentRound) {
      const row = $("claim-" + d.index);
      if (row) setRowStatus(row, d.status);
      else addClaimRow(checksContainer(), d.index, c);
    }

  } else if (msg.event === "check-result") {
    const cr = roundData(currentRound || 1);
    if (d.check === "deterministic") {
      cr.det = { status: d.passed ? "pass" : "fail", output: d.output || "" };
      if (viewing === currentRound) {
        const row = $("check-det");
        if (row && d.passed) setRowStatus(row, "pass");
        else rebuild(); // failure adds the verifier-output block
      }
    } else {
      if (!cr.coh) cr.coh = { status: "checking", stream: "", output: "" };
      cr.coh.status = d.passed ? "pass" : "fail";
      cr.coh.output = d.output || "";
      if (viewing === currentRound) {
        const row = $("check-coh");
        if (row) setRowStatus(row, cr.coh.status);
        else addCoherenceRow(checksContainer(), cr.coh);
      }
    }

  } else if (msg.event === "answer") {
    const cr = roundData(currentRound || 1);
    cr.answerHtml = d.html;
    // A draft can arrive while the searcher is still iterating on it, before the
    // deterministic phase starts — show that check pending alongside the draft
    if (!cr.det && !terminal) {
      cr.det = { status: "checking", output: "" };
      if (viewing === currentRound && !$("check-det")) addDetRow(checksContainer(), cr.det);
    }
    if (viewing === currentRound || currentRound === 0) {
      $("answer").innerHTML = d.html;
      window.renderAllPreviews?.();
    }
  } else if (msg.event === "tokens") {
    renderTokens(d);
  }
  // "feedback" events are intentionally not displayed: the feedback text
  // appears in the next round's searcher stream instead
}

// Order the agents we know; anything else still renders, so adding an agent
// server-side needs no change here.
const AGENT_ORDER = ["searcher", "semantic", "coherence"];

function money(n) {
  // Runs are cheap enough that 2dp rounds most of them to $0.00. A cheap
  // agent still must not render as $0.0000, which reads as broken rather
  // than as "too small to show".
  n = n || 0;
  if (n === 0) return "$0";
  if (n < 0.0001) return "<$0.0001";
  return "$" + n.toFixed(4);
}

// Each `tokens` event carries the full running total, so the bar is rebuilt
// rather than incremented — replay after a reload lands on the same state.
function renderTokens(d) {
  const bar = $("token-bar");
  if (!bar || !d || !d.total) return;
  const names = Object.keys(d.by_agent || {})
    .sort((a, b) => (AGENT_ORDER.indexOf(a) + 1 || 99) - (AGENT_ORDER.indexOf(b) + 1 || 99));
  const per = names
    .filter(a => d.by_agent[a]?.calls)
    .map(a => {
      const b = d.by_agent[a];
      return `<span class="tk-agent">${a} <b>${b.total.toLocaleString()}</b>`
           + ` <span class="tk-cost">${money(b.cost)} · ${b.calls} call${b.calls === 1 ? "" : "s"}</span></span>`;
    }).join("");
  bar.innerHTML = `<span class="tk-label">Tokens</span>${per}`
    + `<span class="tk-total">total <b>${d.total.total.toLocaleString()}</b> · ${money(d.total.cost)}</span>`;
  bar.classList.add("on");
}

function connect() {
  const proto = location.protocol === "https:" ? "wss:" : "ws:";
  const ws = new WebSocket(`${proto}//${location.host}/ws/${encodeURIComponent(RUN_ID)}`);
  ws.onopen = () => ws.send(JSON.stringify({ last_id: lastId }));
  ws.onmessage = (e) => handle(JSON.parse(e.data));
  ws.onclose = () => { if (!terminal) setTimeout(connect, 2000); };
}
viewing = currentRound = 0;
rebuild();
connect();
</script>
{% endif %}

<script type="module">
import * as pdfjsLib from "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.mjs";
pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.worker.min.mjs";

const SCALE = 1.5;

async function renderPreview(wrap) {
  const pdfPath = wrap.dataset.pdf;
  const pageNum = parseInt(wrap.dataset.page, 10);
  const highlights = JSON.parse(wrap.dataset.highlights || "[]");
  const canvas = wrap.querySelector("canvas");

  try {
    const pdf = await pdfjsLib.getDocument(pdfPath).promise;
    const page = await pdf.getPage(pageNum);
    const viewport = page.getViewport({ scale: SCALE });

    // Show only a one-third-page-height band, centered on the highlights
    const bandH = viewport.height / 3;
    let center = bandH / 2;
    if (highlights.length) {
      let minY = Infinity, maxY = -Infinity;
      for (const h of highlights) {
        minY = Math.min(minY, h.bbox[1]);
        maxY = Math.max(maxY, h.bbox[3]);
      }
      center = ((minY + maxY) / 2) * SCALE;
    }
    const cropTop = Math.min(Math.max(center - bandH / 2, 0), viewport.height - bandH);

    canvas.width = viewport.width;
    canvas.height = bandH;
    const ctx = canvas.getContext("2d");

    await page.render({ canvasContext: ctx, viewport: viewport,
                        transform: [1, 0, 0, 1, 0, -cropTop] }).promise;

    for (const h of highlights) {
      const [x0, y0, x1, y1] = h.bbox;
      ctx.fillStyle = "rgba(255, 213, 0, 0.35)";
      ctx.fillRect(x0 * SCALE, y0 * SCALE - cropTop, (x1 - x0) * SCALE, (y1 - y0) * SCALE);
    }
  } catch (e) {
    canvas.style.display = "none";
  }
}

window.renderAllPreviews = () =>
  document.querySelectorAll(".pdf-preview-wrap").forEach((wrap) => {
    // answer fragments persisted before previews became collapsible
    // replay without the <details>; wrap them here so old runs match
    if (!wrap.closest("details.pdf-preview-details")) {
      const det = document.createElement("details");
      det.className = "pdf-preview-details";
      det.innerHTML = "<summary>page preview</summary>";
      wrap.replaceWith(det);
      det.appendChild(wrap);
    }
    renderPreview(wrap);
  });
window.renderAllPreviews();
</script>
