question: "In RP2040 is there a PIO instruction that can detect if a pull will be blocking? or if a pull has blocked?"
answers:
  - claim: "The PIO has only nine instructions, and the PULL instruction has a Block bit that determines whether a PULL from an empty TX FIFO stalls or copies X to OSR"
    citations:
      - text: "The PIO has a total of nine instructions: JMP, WAIT, IN, OUT, PUSH, PULL, MOV, IRQ, and SET. See Section 3.4 for details on these instructions. Though the PIO only has a total of nine instructions, it would be difficult"
        page: 314
        source: "RP-008371-DS-1-rp2040-datasheet.pdf"
      - text: "Block: If 1, stall if TX FIFO is empty. If 0, pulling from an empty FIFO copies scratch X to OSR. Some peripherals (UART, SPI…) should halt when no data is available, and pick it up as it comes in; others (I2S)"
        page: 328
        source: "RP-008371-DS-1-rp2040-datasheet.pdf"
  - claim: "A nonblocking PULL on an empty TX FIFO does not stall and instead copies scratch X to OSR, providing a way for a PIO program to handle the empty FIFO case without needing to detect whether the pull will block"
    citations:
      - text: "Block: If 1, stall if TX FIFO is empty. If 0, pulling from an empty FIFO copies scratch X to OSR. Some peripherals (UART, SPI…) should halt when no data is available, and pick it up as it comes in; others (I2S)"
        page: 328
        source: "RP-008371-DS-1-rp2040-datasheet.pdf"
      - text: "A nonblocking PULL on an empty FIFO has the same effect as MOV OSR, X. The program can either preload scratch register X with a suitable default, or execute a MOV X, OSR after each PULL NOBLOCK, so that the last"
        page: 328
        source: "RP-008371-DS-1-rp2040-datasheet.pdf"
  - claim: "A blocking PULL stalls when the TX FIFO is empty; after the fact, the stall can be detected from the system side by reading the PIO FDEBUG register's TXSTALL bit, but there is no PIO instruction that detects past stalls from within the PIO program itself"
    citations:
      - text: "A blocking PULL when the TX FIFO is empty, or a blocking PUSH when the RX FIFO is full • An IRQ WAIT instruction which has set an IRQ flag, and is waiting for it to clear • An OUT instruction when autopull is enabled,"
        page: 318
        source: "RP-008371-DS-1-rp2040-datasheet.pdf"
      - text: "TXSTALL: State machine has stalled on empty TX FIFO during a blocking PULL, or an OUT with autopull enabled. Write 1 to clear. WC 0x0 23:20 Reserved. - - 19:16 TXOVER: TX FIFO overflow (i.e. write-on-full by the"
        page: 374
        source: "RP-008371-DS-1-rp2040-datasheet.pdf"
