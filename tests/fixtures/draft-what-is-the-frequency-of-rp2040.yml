question: "What is the frequency of RP2040?"
concatenation: "The RP2040 microcontroller features dual ARM Cortex-M0+ processor cores running at up to 133MHz standard, or up to 200MHz with an elevated core supply of 1.15V. The system clock (clk_sys) has a maximum frequency of 133MHz across all process, voltage and temperature variations, but can achieve 200MHz by running at an elevated core supply (DVDD) and setting VREG VSEL to 1.15V."
answers:
